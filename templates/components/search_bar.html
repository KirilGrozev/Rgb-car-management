<div class="list-toolbar">
    <form method="get" class="search-form">
        <input
                type="text"
                name="{{ search_param|default:'q' }}"
                placeholder="Търси..."
                value="{{ search_query }}"
        >
        <button type="submit" class="btn">Търси</button>
        <a href="{{ clear_url }}" class="btn">Изчисти</a>
    </form>
</div>
