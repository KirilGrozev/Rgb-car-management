<div class="card mb-4">
    <div class="card-body">
        <form method="get" class="form-inline">
            <input
                type="text"
                name="search"
                class="form-control mr-2"
                placeholder="{{ placeholder }}"
                value="{{ search_query }}"
            >
            <button type="submit" class="btn btn-primary mr-2">Search</button>
            <a href="{{ clear_url }}" class="btn btn-secondary">Clear</a>
        </form>
    </div>
</div>
